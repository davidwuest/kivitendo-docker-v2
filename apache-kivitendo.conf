<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /opt/kivitendo-erp

    AliasMatch ^/[^/]+\.pl /opt/kivitendo-erp/dispatcher.fcgi
    Alias /kivitendo-erp/ /opt/kivitendo-erp/
    FcgidMaxRequestLen 10485760
    <Directory /opt/kivitendo-erp>
        AllowOverride All
        Options ExecCGI Includes FollowSymlinks
        Require all granted
    </Directory>

    <DirectoryMatch /path/to/kivitendo-erp/users>
        Require all denied
    </DirectoryMatch>

    ErrorLog /dev/stdout
    CustomLog /dev/stdout combined
</VirtualHost>